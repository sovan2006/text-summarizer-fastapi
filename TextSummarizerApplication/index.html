<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXT SUMMARIZER</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #0f5ca9;
            margin: 0;
            padding: 0;
            color: #2c1f1f;
        }
        .container{
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #72c7d8;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1{
            text-align: center;
            color: #007BFF;
        }
        h3{
            text-align: center;
            color: #555;
        }
        p{
            text-align: center;
            color: #666;
        }
        form{   
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        textarea{
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            font-size: 16px;
        }
        button{
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover{
            background-color: #0056b3;
        }
        .summary-output{
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #summary-heading{
            text-align: center;     
            color: #007BFF;
        }


    </style>
</head>
<body>
    <div class="container">
        <h1>TEXT SUMMARIZER</h1>
        <h3>Using HuggingFace Transformers</h3>
        <p>Write of paste your content below for quick summarization</p>
        <form action="" id ="summarizer-form">
            <textarea name="" id="dialogue-input" placeholder="Enter your text here....." required></textarea>
            <button type="Submit">Summarize</button>
        </form>
        <div class="summary-output">

            <h3 id="summary-heading">Content summary</h3>
            <p id="summary-text"></p>
        </div>



        </div>

    </div>
    <script>
        
        document.getElementById('summarizer-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const inputText = document.getElementById('dialogue-input').value;
            const summaryTextElement = document.getElementById('summary-text');
            summaryTextElement.textContent = "Summarizing...";

            try {
                const response = await fetch('/summarize/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ dialogue: inputText })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                summaryTextElement.textContent = data.summary;
            } catch (error) {
                console.error('Error:', error);
                summaryTextElement.textContent = "An error occurred while summarizing the text.";
            }
        });
    </script>
    
</body>
</html>
